<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header class = "header">
        <img src="/assets/SoulMove_Pequena.png" alt="Logo da SoulMove" class = "header_logo">

        <nav class = "header_menu">
            <a href="index.html" class = "header_menu_link">Início</a>
            <a href="integrantes.html" class = "header_menu_link">Quem Somos</a>
            <a href="sobre.html" class = "header_menu_link">Sobre</a>
            <a href="aplicacao.html" class = "header_menu_link">Aplicação</a>
            <a href="faq.html" class = "header_menu_link">FAQ</a>
        </nav>
    </header>

    <main>
        <h1>Contato</h1>

        <section>
            <div>
                <form id="">

                    <div>
                        <label for="name">Nome</label>
                        <input type="text" id="name" placeholder="Digite seu nome" />
                    </div>

                    <div>
                        <label for="mail">E-mail</label>
                        <input type="email" id="mail" placeholder="Digite seu e-mail" />
                    </div>

                    <div>
                        <label for="number">Número</label>
                        <input type="number" id="number" placeholder="Digite seu número" />
                    </div>

                    <div>
                        <label for="message">Mensagem</label>
                        <input type="text" id="message" placeholder="Digite sua mensagem" />
                    </div>

                    <button type="submit">Enviar</button>
                    
                </form>
            </div>

            <img src="/assets/placeholder_grupo.png" alt="Placeholder">
        </section>
    </main>

    <footer class = "footer">
        <nav class = "footer_menu">
            <a href="index.html" class = "footer_menu_link">Início</a>
            <a href="integrantes.html" class = "footer_menu_link">Quem Somos</a>
            <a href="sobre.html" class = "footer_menu_link">Sobre</a>
            <a href="aplicacao.html" class = "footer_menu_link">Aplicação</a>
            <a href="faq.html" class = "footer_menu_link">FAQ</a>
        </nav>

        <p class = "footer_text">© 2026 Antípoda. Todos os direitos reservados.</p>
    </footer>
    
    <script src="/scripts/script.js"></script>
</body>
</html>
